<style>
  :root {
    --bg: #0b0d12;
    --bg2: #0f1218;
    --card: #161a22;
    --card2: #1f242e;
    --text: #f4f5fa;
    --sub: #98a0b3;
    --accent: #8b6cff;
    --accent2: #6f4ce0;
    --grad: linear-gradient(135deg, #7c5cff 0%, #b14cff 55%, #ff5c8a 100%);
    --danger: #ff6b8a;
    --line: #232834;
    --radius: 16px;
    --safe-top: env(safe-area-inset-top, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(124,92,255,0.12), transparent 60%),
      var(--bg);
    background-attachment: fixed;
    color: var(--text);
    line-height: 1.6;
  }
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(11,13,18,0.72);
    backdrop-filter: saturate(160%) blur(14px);
    -webkit-backdrop-filter: saturate(160%) blur(14px);
    padding: calc(12px + var(--safe-top)) 16px 14px;
    border-bottom: 1px solid var(--line);
  }
  /* ブランドロゴ */
  .brand {
    flex: 1;
    min-width: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    margin: 0;
    cursor: pointer;
    user-select: none;
  }
  .brand .logo-mark {
    width: 26px; height: 26px; flex: none;
    filter: drop-shadow(0 2px 6px rgba(124,92,255,0.5));
  }
  .brand .logo-text {
    font-family: "Outfit", -apple-system, sans-serif;
    font-weight: 800;
    font-size: 1.45rem;
    letter-spacing: -0.02em;
    background: var(--grad);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
  }
  .search-row {
    display: flex;
    gap: 8px;
    max-width: 560px;
    margin: 0 auto;
  }
  .search-field {
    position: relative;
    flex: 1;
    min-width: 0;
  }
  .search-field .si {
    position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
    color: var(--sub); pointer-events: none; font-size: 15px;
  }
  #q {
    width: 100%;
    min-width: 0;
    padding: 13px 14px 13px 38px;
    font-size: 16px;
    border-radius: var(--radius);
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  #q:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,92,255,0.18); }
  #searchBtn {
    padding: 13px 18px;
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: var(--radius);
    background: var(--grad);
    color: #fff;
    cursor: pointer;
    white-space: nowrap;
    box-shadow: 0 4px 14px rgba(124,92,255,0.35);
    transition: transform 0.1s, filter 0.15s;
  }
  #searchBtn:active { transform: scale(0.97); filter: brightness(0.95); }
  #searchBtn:disabled { opacity: 0.5; cursor: default; box-shadow: none; }

  /* --- 検索サジェスト（予測変換） --- */
  .suggest {
    position: absolute;
    top: calc(100% + 6px);
    left: 0; right: 0;
    margin: 0; padding: 6px;
    list-style: none;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: 0 12px 32px rgba(0,0,0,0.45);
    z-index: 50;
    max-height: 62vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .suggest[hidden] { display: none; }
  .suggest-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 8px;
    border-radius: 10px;
    cursor: pointer;
  }
  .suggest-item:hover,
  .suggest-item.active { background: rgba(124,92,255,0.18); }
  .suggest-thumb {
    width: 34px; height: 50px;
    flex: 0 0 auto;
    border-radius: 5px;
    object-fit: cover;
    background: var(--line);
  }
  .suggest-thumb.ph {
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; color: var(--sub); text-align: center; line-height: 1.1;
  }
  .suggest-meta { min-width: 0; flex: 1; }
  .suggest-title {
    font-size: 14px; font-weight: 600; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .suggest-sub { font-size: 12px; color: var(--sub); margin-top: 2px; }
  .suggest-empty { padding: 12px 10px; font-size: 13px; color: var(--sub); text-align: center; }

  main {
    max-width: 560px;
    margin: 0 auto;
    padding: 16px;
  }
  .status {
    text-align: center;
    color: var(--sub);
    padding: 32px 16px;
    font-size: 0.95rem;
  }
  .status.error {
    color: var(--danger);
    background: rgba(255,107,107,0.08);
    border: 1px solid rgba(255,107,107,0.25);
    border-radius: var(--radius);
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid #333944;
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  .spinner.sm { width: 22px; height: 22px; border-width: 3px; margin: 0 auto; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .card {
    background: var(--card);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    border: 1px solid var(--line);
    transition: transform 0.12s, border-color 0.15s, box-shadow 0.15s;
  }
  .card:hover { border-color: rgba(124,92,255,0.45); box-shadow: 0 8px 22px rgba(0,0,0,0.35); }
  .card:active { transform: scale(0.98); }
  .poster {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    background: var(--card2);
    display: block;
  }
  .poster.placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--sub);
    font-size: 0.8rem;
    text-align: center;
    padding: 8px;
  }
  .card-body { padding: 8px 10px 12px; }
  .card-title {
    font-size: 0.9rem;
    font-weight: 600;
    margin: 0 0 2px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-meta { font-size: 0.78rem; color: var(--sub); }
  .badge {
    display: inline-block;
    font-size: 0.68rem;
    padding: 1px 7px;
    border-radius: 999px;
    background: var(--card2);
    color: var(--sub);
    margin-left: 6px;
  }

  /* ===== ホーム ===== */
  .row { margin-bottom: 26px; }
  .row-title {
    font-size: 1rem;
    font-weight: 700;
    margin: 0 0 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .more-link {
    margin-left: auto;
    flex: none;
    background: none;
    border: none;
    color: var(--accent);
    font-size: 0.78rem;
    font-weight: 700;
    cursor: pointer;
    padding: 4px 2px 4px 8px;
    white-space: nowrap;
  }
  .more-link:active { opacity: 0.55; }
  .browse-title { font-size: 1.15rem; margin-bottom: 14px; }
  .rail {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 4px;
    margin: 0 -16px;
    padding-left: 16px;
    padding-right: 16px;
  }
  .rail::-webkit-scrollbar { height: 0; }
  .rail-card {
    flex: 0 0 auto;
    width: 116px;
    scroll-snap-align: start;
    cursor: pointer;
  }
  .rail-card:active { transform: scale(0.97); }
  .rail-poster {
    width: 116px;
    height: 174px;
    object-fit: cover;
    border-radius: 10px;
    background: var(--card2);
    display: block;
    border: 1px solid #262a33;
  }
  .rail-poster.placeholder {
    display: flex; align-items: center; justify-content: center;
    color: var(--sub); font-size: 0.72rem; text-align: center; padding: 6px;
  }
  .rail-rank {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--accent);
    margin-right: 4px;
  }
  .rail-title {
    font-size: 0.76rem;
    margin: 6px 0 0;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    color: #dfe4ec;
  }
  .row .status { padding: 18px; font-size: 0.85rem; }

  /* カテゴリ別チップ */
  .chips {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    margin: 0 -16px 14px;
    padding: 0 16px;
    -webkit-overflow-scrolling: touch;
  }
  .chips::-webkit-scrollbar { height: 0; }
  .chip {
    flex: 0 0 auto;
    padding: 7px 14px;
    font-size: 0.82rem;
    font-weight: 600;
    border-radius: 999px;
    border: 1px solid #333944;
    background: var(--card);
    color: var(--sub);
    cursor: pointer;
    white-space: nowrap;
  }
  .chip.active { background: var(--grad); color: #fff; border-color: transparent; box-shadow: 0 3px 12px rgba(124,92,255,0.3); }

  /* 無限スクロール用センチネル */
  #sentinel { height: 1px; }
  .loadmore {
    text-align: center;
    color: var(--sub);
    padding: 20px 16px 8px;
    font-size: 0.85rem;
  }
  .loadmore.end { color: #5a6271; font-size: 0.78rem; }

  /* ===== モーダル ===== */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    height: 100vh;       /* 非対応ブラウザ用フォールバック */
    height: 100dvh;      /* URLバーを除いた実表示領域に追従 */
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 50;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg);
    width: 100%;
    max-width: 560px;
    max-height: 88vh;    /* 非対応ブラウザ用フォールバック */
    max-height: 88dvh;   /* URLバーを除いた実表示領域基準 */
    overflow-y: auto;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
    border-radius: 20px 20px 0 0;
    border-top: 1px solid #2a2f3a;
    animation: slideUp 0.25s ease;
  }

  /* ×ボタンを常時表示（スクロールしても上部に固定） */
  .modal-sticky {
    position: sticky;
    top: 0;
    height: 0;
    z-index: 6;
  }
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0.4; } to { transform: translateY(0); opacity: 1; } }
  .modal-header {
    display: flex;
    gap: 12px;
    padding: 18px 16px 12px;
    position: relative;
  }
  .modal-poster {
    width: 84px;
    aspect-ratio: 2/3;
    object-fit: cover;
    border-radius: 8px;
    flex-shrink: 0;
    background: var(--card2);
  }
  .modal-info { flex: 1; min-width: 0; padding-right: 28px; }
  .modal-info h2 { font-size: 1.05rem; margin: 0 0 4px; }
  .modal-info .sub { color: var(--sub); font-size: 0.82rem; margin-bottom: 8px; }
  .overview { font-size: 0.82rem; color: #cdd3dd; margin: 0; }
  .closeBtn {
    position: absolute;
    top: 12px; right: 12px;
    width: 30px; height: 30px;
    border-radius: 50%;
    border: none;
    background: var(--card2);
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
  }
  .modal-section { padding: 6px 16px 24px; }

  .tabs {
    display: flex;
    gap: 6px;
    margin: 14px 0 14px;
    background: var(--card);
    padding: 4px;
    border-radius: 12px;
    border: 1px solid #262a33;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 8px 4px;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--sub);
    background: transparent;
    border: none;
    border-radius: 9px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .tab.active { background: var(--grad); color: #fff; box-shadow: 0 3px 12px rgba(124,92,255,0.28); }
  .tab .count { font-size: 0.66rem; opacity: 0.85; margin-left: 3px; }

  .providers {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(86px, 1fr));
    gap: 10px;
  }
  .provider {
    background: var(--card);
    border: 1px solid #262a33;
    border-radius: 12px;
    padding: 10px 6px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.1s, border-color 0.15s;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .provider:active { transform: scale(0.96); }
  .provider:hover { border-color: var(--accent); }
  .provider img {
    width: 46px; height: 46px;
    border-radius: 10px;
    object-fit: cover;
    margin-bottom: 6px;
  }
  .provider span {
    display: block;
    font-size: 0.72rem;
    color: var(--sub);
    line-height: 1.25;
  }
  .provider .arrow { font-size: 0.62rem; color: var(--accent); margin-top: 3px; }

  /* アフィリエイト誘導ボタン（未登録サービスでの新規登録） */
  .provider.affiliate {
    background: linear-gradient(160deg, rgba(124,92,255,0.16), rgba(255,90,170,0.12));
    border-color: var(--accent);
  }
  .provider.affiliate:hover { filter: brightness(1.08); }
  .provider.affiliate .aff-arrow { color: #ff7ac0; font-weight: 700; }
  .pr-badge {
    display: inline-block;
    margin-left: 4px;
    padding: 1px 5px;
    font-size: 0.6rem;
    font-weight: 700;
    line-height: 1.3;
    border-radius: 5px;
    background: rgba(255,255,255,0.16);
    color: var(--text);
    vertical-align: middle;
  }

  /* その他サービスで探す */
  .extra-label {
    font-size: 0.85rem;
    font-weight: 700;
    margin: 22px 0 6px;
    color: var(--text);
  }
  .extra-note { font-size: 0.72rem; color: var(--sub); margin: 0 0 10px; }
  .extra-links { display: flex; flex-wrap: wrap; gap: 8px; }
  .extra-link {
    display: inline-block;
    padding: 8px 14px;
    font-size: 0.8rem;
    font-weight: 600;
    border-radius: 999px;
    border: 1px solid #333944;
    background: var(--card);
    color: var(--accent);
    text-decoration: none;
  }
  .extra-link:active { transform: scale(0.96); }

  /* 作品メタ情報（評価・尺・ジャンル） */
  .modal-meta {
    display: flex; flex-wrap: wrap; align-items: center;
    gap: 4px 10px; font-size: 0.8rem; color: var(--sub); margin: 2px 0 6px;
  }
  .modal-meta .star { color: #ffc14d; font-weight: 700; }
  .genre-tags { display: flex; flex-wrap: wrap; gap: 6px; margin: 0 0 8px; }
  .genre-tag {
    font-size: 0.68rem; padding: 2px 9px; border-radius: 999px;
    background: var(--card2); color: var(--sub);
  }

  /* 予告編 */
  .trailer {
    position: relative; width: 100%; aspect-ratio: 16/9;
    border-radius: 12px; overflow: hidden; margin: 6px 0 4px; background: #000;
  }
  .trailer iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }

  /* モーダル内セクション見出し */
  .sub-label { font-size: 0.92rem; font-weight: 700; margin: 22px 0 10px; }

  /* キャスト */
  .cast-rail { display: flex; gap: 12px; overflow-x: auto; margin: 0 -16px; padding: 0 16px 4px; }
  .cast-rail::-webkit-scrollbar { height: 0; }
  .cast { flex: 0 0 auto; width: 74px; text-align: center; }
  .cast img, .cast .noimg {
    width: 74px; height: 74px; border-radius: 50%; object-fit: cover;
    background: var(--card2); display: block;
  }
  .cast .noimg { display: flex; align-items: center; justify-content: center; color: var(--sub); font-size: 0.62rem; }
  .cast .nm { font-size: 0.68rem; margin-top: 5px; line-height: 1.25; color: #dfe4ec; }
  .cast .ch { font-size: 0.62rem; color: var(--sub); margin-top: 1px; }

  /* シェアボタン */
  .shareBtn {
    position: absolute; top: 12px; right: 50px;
    width: 30px; height: 30px; border-radius: 50%; border: none;
    background: var(--card2); color: var(--text); font-size: 14px; cursor: pointer; line-height: 1;
  }

  /* トースト */
  .toast {
    position: fixed; left: 50%; bottom: 40px;
    transform: translateX(-50%) translateY(10px);
    background: #fff; color: #16181d; padding: 11px 20px; border-radius: 999px;
    font-size: 0.85rem; font-weight: 700; z-index: 100;
    box-shadow: 0 6px 24px rgba(0,0,0,0.45);
    opacity: 0; transition: opacity .22s, transform .22s; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ヘッダー上段（お気に入り・ロゴ・設定をflexで確実に中央揃え） */
  .header-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 13px;
  }
  .fav-btn, .settings-btn {
    position: relative;
    flex: none;
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    padding: 0;
    border-radius: 50%;
    border: 1px solid var(--line); background: var(--card); color: var(--text);
    font-size: 16px; cursor: pointer; line-height: 1;
  }
  .fav-btn.has { color: var(--danger); border-color: rgba(255,107,107,0.5); }
  .fav-btn .fav-count {
    position: absolute; top: -5px; right: -5px;
    min-width: 16px; height: 16px; padding: 0 4px;
    background: var(--danger); color: #fff;
    font-size: 0.6rem; font-weight: 700;
    border-radius: 999px; line-height: 16px; text-align: center;
  }

  /* 詳細モーダルのアクション行（お気に入り／シェア） */
  .action-row { display: flex; gap: 8px; margin: 2px 0 4px; }
  .action-btn {
    flex: 1; padding: 11px; border-radius: 11px;
    border: 1px solid #333944; background: var(--card);
    color: var(--text); font-size: 0.85rem; font-weight: 600; cursor: pointer;

<script>
"use strict";

const API_KEY = "aa9cb50c43ec1d77e920aa78e66e32e9";
const API_BASE = "https://api.themoviedb.org/3";
const IMG_BASE = "https://image.tmdb.org/t/p/";

// ====================================================================
//  アクセス解析（GA4）— 測定IDを入れると自動で有効化。空なら完全無効。
//  GA_ID = "G-XXXXXXXXXX"（Googleアナリティクスで作成したプロパティのID）
// ====================================================================
const GA_ID = "";   // ← 社長がGA4プロパティ作成後にここへ測定IDを貼る
(function initGA() {
  if (!GA_ID) return;
  const s = document.createElement("script");
  s.async = true;
  s.src = "https://www.googletagmanager.com/gtag/js?id=" + GA_ID;
  document.head.appendChild(s);
  window.dataLayer = window.dataLayer || [];
  window.gtag = function () { window.dataLayer.push(arguments); };
  window.gtag("js", new Date());
  window.gtag("config", GA_ID);
})();
// イベント計測ヘルパー（GA未設定時は何もしない）
function trackEvent(name, params) {
  if (GA_ID && typeof window.gtag === "function") window.gtag("event", name, params || {});
}

const qInput = document.getElementById("q");
const searchBtn = document.getElementById("searchBtn");

  query: "", page: 0, totalPages: 0,
  loading: false, seen: new Set(), count: 0
};

let detailState = null;

// --- 共通: TMDB APIリクエスト ---
async function tmdbFetch(path, params = {}) {
  const url = new URL(API_BASE + path);
  url.searchParams.set("api_key", API_KEY);
  for (const [k, v] of Object.entries(params)) url.searchParams.set(k, v);

  let res;
  try {
    res = await fetch(url);
  } catch (e) {
    throw new Error("通信に失敗しました。ネット接続を確認してください。");
  }
  if (!res.ok) {
    throw new Error("サーバーからエラーが返されました（" + res.status + "）。時間をおいて再度お試しください。");
  }
  return res.json();
}

function statusHTML(msg, isError = false, withSpinner = false) {
  return '<div class="status' + (isError ? ' error' : '') + '">'
    + (withSpinner ? '<div class="spinner"></div>' : '')
    + msg + '</div>';
}

function posterURL(path, size) {
  return path ? IMG_BASE + size + path : null;
}

// --- TMDBの生データ → 共通アイテム形式 ---
function makeItem(raw, defaultType) {
  const type = (raw.media_type === "movie" || raw.media_type === "tv")
    ? raw.media_type : defaultType;
  const title = raw.title || raw.name || "（タイトル不明）";
  const dateStr = raw.release_date || raw.first_air_date || "";
  return {
    type,
    id: raw.id,
    title,
    year: dateStr ? dateStr.slice(0, 4) : "—",
    typeLabel: type === "movie" ? "映画" : "ドラマ",
    poster: raw.poster_path,
    genreIds: raw.genre_ids || [],           // パーソナライズ用（レール並べ替え）
    popularity: raw.popularity || 0,
    voteAvg: raw.vote_average || 0
  };
}

// ====================================================================
//  パーソナライズ（自分の閲覧履歴・お気に入りの傾向でレールを並べ替え）
//  すべて localStorage 由来。バックエンド不要・端末ローカルのみ。
// ====================================================================
let _userProfile = null;
function invalidateProfile() { _userProfile = null; }

// 閲覧履歴(時間減衰あり)＋お気に入り(明示的意図=重め)からジャンル嗜好を抽出
function buildUserProfile() {
  const genreWeight = {};
  recentlyViewed.forEach((item, i) => {
    const decay = 1 / (1 + i * 0.15);       // 新しい閲覧ほど重い（i=0で1.0, i=19で約0.26）
    (item.genres || []).forEach(gid => { genreWeight[gid] = (genreWeight[gid] || 0) + decay; });
  });
  favorites.forEach(item => {               // favorites は Map（値を走査）
    (item.genres || []).forEach(gid => { genreWeight[gid] = (genreWeight[gid] || 0) + 1.5; });
  });
  const total = Object.values(genreWeight).reduce((a, b) => a + b, 0);
  return { genreWeight, isEmpty: total === 0 };
}
function getUserProfile() {
  if (!_userProfile) _userProfile = buildUserProfile();
  return _userProfile;
}

// TMDBの並び(=市場トレンド)を主軸に、自分のジャンル嗜好で穏やかに浮上させる。
// score = 0.6×トレンド順位 + 0.4×ジャンル一致。元の curation を壊しすぎない配合。
function personalizeItems(items) {
  const profile = getUserProfile();
  if (profile.isEmpty || items.length < 2) return items;
  const N = items.length;
  const raws = items.map(it => (it.genreIds || [])
    .reduce((s, gid) => s + (profile.genreWeight[gid] || 0), 0));
  const maxRaw = Math.max(1e-9, ...raws);
  return items
    .map((it, i) => ({ it, score: 0.6 * (1 - i / N) + 0.4 * (raws[i] / maxRaw) }))
    .sort((a, b) => b.score - a.score)
    .map(s => s.it);
}

  if (recentlyViewed.length > 0) renderRecentRail();
  // お気に入り（保存済みデータからその場で描画・APIフェッチ不要）
  if (favorites.size > 0) renderFavRail();

  // 日付ヘルパ（期間絞り込み・将来も動くよう動的計算）

  // 各レールの設定（レール本体と「もっとみる」で共有＝中身が一致する）

  //   「今週話題の映画」は discover（見放題×人気×新しめ）をソースにする
  HOME_CFGS = {

        "vote_count.gte": "100", "primary_release_date.gte": fmtDate(yearsAgo(3)), include_adult: "false" } },

    popular: { title: "📈 いま日本で人気の配信作品", type: "movie", availMode: "flatrate", path: "/discover/movie",

    fresh: { title: "🎌 最近の高評価な邦画", type: "movie", availMode: "flatrate", path: "/discover/movie",

function loadRailCfg(containerId, cfg, ranked) {
  return loadRail(containerId, cfg.path, cfg.params, cfg.type, ranked, cfg.availMode);
}

function rowSkeleton(id, title, moreKey) {

  return '<section class="row"><h2 class="row-title">' + title + more + '</h2>'
    + '<div id="' + id + '"><div class="status"><div class="spinner sm"></div></div></div></section>';
}

// 日本の配信状況(providers)を取得。応答はセッション内キャッシュして無駄打ちを防ぐ。
// 配信状況はJustWatch由来で日次更新されるため、表示直前にこの最新値で判定する。
const providersCache = new Map(); // "type:id" -> jp providers object | null(取得失敗)

// providers確認はレールをまたいで多数発火するため、同時実行数を制限して
// レート制限による「誤った除外」を防ぐ（正確性のため）。
let _provInFlight = 0;
const _provQueue = [];
function _provAcquire() {
  return new Promise(res => {
    if (_provInFlight < 6) { _provInFlight++; res(); }
    else _provQueue.push(res);
  });
}
function _provRelease() {
  _provInFlight--;
  if (_provQueue.length) { _provInFlight++; _provQueue.shift()(); }
}

async function getJPProviders(type, id) {
  const key = type + ":" + id;
  if (providersCache.has(key)) return providersCache.get(key);
  await _provAcquire();
  try {
    for (let attempt = 0; attempt < 2; attempt++) {
      try {
        const pv = await tmdbFetch("/" + type + "/" + id + "/watch/providers");
        const jp = (pv.results && pv.results.JP) || {};
        providersCache.set(key, jp);
        return jp;
      } catch (e) {
        if (attempt === 0) { await new Promise(r => setTimeout(r, 500)); continue; }
        return null; // リトライしても失敗
      }
    }
  } finally {
    _provRelease();
  }
}
function jpHasFlatrate(jp) { return !!(jp && (jp.flatrate || []).length); }
function jpHasAny(jp) {
  return !!(jp && ["flatrate", "free", "ads", "rent", "buy"].some(k => (jp[k] || []).length));
}

// availMode:
//   "flatrate" … 見放題サービスが1つ以上ある作品だけ表示（providersで実確認）
//   "any"      … 見放題/無料/レンタル/購入のいずれかがある作品だけ表示
//   それ以外    … 絞り込みなし
// 正確性のため、取得失敗した作品は安全側で除外（不確かな表示を避ける）。
async function loadRail(containerId, path, params, defaultType, ranked, availMode) {
  const box = document.getElementById(containerId);
  if (!box) return;
  try {
    const data = await tmdbFetch(path, Object.assign({ language: LANG, region: REGION }, params));
    let items = (data.results || [])
      .filter(r => r.media_type !== "person")
      .map(r => makeItem(r, defaultType))
      .filter(it => it.id && it.poster); // ポスター有りのみ＝見た目を統一

    if (availMode && items.length) {
      const jps = await Promise.all(items.map(it => getJPProviders(it.type, it.id)));
      items = items.filter((it, i) => {
        const jp = jps[i];
        if (jp === null) return false; // 取得失敗は除外（正確性優先）
        return availMode === "flatrate" ? jpHasFlatrate(jp) : jpHasAny(jp);
      });
    }

    if (items.length === 0) {
      box.innerHTML = statusHTML("情報を取得できませんでした。", false);
      return;
    }

    // ランキング系(Netflix公式Top10等)は公式順を維持。それ以外は自分の嗜好で並べ替え。
    if (!ranked) items = personalizeItems(items);

    const rail = document.createElement("div");
    rail.className = "rail";
    items.forEach((it, i) => rail.appendChild(railCardEl(it, ranked ? i + 1 : 0)));
    box.innerHTML = "";
    box.appendChild(rail);
  } catch (e) {
    box.innerHTML = statusHTML("読み込みに失敗しました。", true);
  }
}

function railCardEl(it, rank) {
  const poster = posterURL(it.poster, "w185");
  const posterEl = poster
    ? '<img class="rail-poster" loading="lazy" src="' + poster + '" alt="">'
    : '<div class="rail-poster placeholder">画像なし</div>';
  const rankEl = rank ? '<span class="rail-rank">' + rank + '位</span>' : '';

  const card = document.createElement("div");
  card.className = "rail-card";
  card.innerHTML = posterEl
    + '<p class="rail-title">' + rankEl + escapeHTML(it.title) + '</p>';
  card.addEventListener("click", () => goDetail(it.type, it.id));
  return card;
}

// --- カテゴリ別 ---
let catLoading = false;
async function loadCategories() {
  const chipsBox = document.getElementById("cat-chips");
  const catGrid = document.getElementById("cat-grid");
  if (!chipsBox || !catGrid) return;

  let genres;
  try {
    const data = await tmdbFetch("/genre/movie/list", { language: LANG });
    genres = data.genres || [];
  } catch (e) {
    chipsBox.innerHTML = "";
    catGrid.innerHTML = statusHTML("カテゴリ情報の取得に失敗しました。", true);
    return;
  }
  if (genres.length === 0) {
    catGrid.innerHTML = statusHTML("カテゴリ情報がありません。", true);
    return;
  }

  chipsBox.innerHTML = "";
  genres.forEach((g, i) => {
    const chip = document.createElement("button");
    chip.className = "chip" + (i === 0 ? " active" : "");
    chip.textContent = g.name;
    chip.dataset.id = g.id;
    chip.addEventListener("click", () => {
      chipsBox.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
      chip.classList.add("active");
      loadGenre(g.id, g.name);
    });
    chipsBox.appendChild(chip);
  });

  loadGenre(genres[0].id, genres[0].name); // 先頭ジャンルを初期表示
}

async function loadGenre(genreId, genreName) {
  const catGrid = document.getElementById("cat-grid");
  if (!catGrid) return;
  if (catLoading) return;
  catLoading = true;
  if (genreName) lastGenre = { id: genreId, name: genreName }; // もっとみる用に保持
  catGrid.innerHTML = statusHTML("読み込み中…", false, true);

  try {
    const params = {
      language: LANG,
      region: REGION,
      with_genres: String(genreId),
      sort_by: "popularity.desc",
      include_adult: "false",
      watch_region: REGION,
      // 見放題/無料/レンタル/購入のいずれかで視聴可能な作品（話題・人気順）
      with_watch_monetization_types: "flatrate|free|ads|rent|buy",
      with_origin_country: "JP|US",              // 邦画＋ハリウッド（外国語ローカル作品を排除）
      "vote_count.gte": "40",
      page: "1"
    };
    // マイサービス設定時はそのサービスで見られる作品に絞る
    if (myServices.size > 0) params.with_watch_providers = myServicesParam();
    const data = await tmdbFetch("/discover/movie", params);
    const items = (data.results || []).map(r => makeItem(r, "movie")).filter(it => it.id && it.poster);

    if (items.length === 0) {
      catGrid.innerHTML = statusHTML("このカテゴリの作品が見つかりませんでした。", true);
      return;
    }
    catGrid.innerHTML = "";
    items.forEach(it => catGrid.appendChild(gridCardEl(it)));
  } catch (e) {
    catGrid.innerHTML = statusHTML("カテゴリの読み込みに失敗しました。", true);
  } finally {
    catLoading = false;
  }
}

// --- グリッド用カード（検索／カテゴリ共用） ---
function gridCardEl(it) {
  const poster = posterURL(it.poster, "w342");
  const posterEl = poster
    ? '<img class="poster" loading="lazy" src="' + poster + '" alt="">'
    : '<div class="poster placeholder">画像なし</div>';

  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = posterEl
    + '<div class="card-body">'
    + '<p class="card-title">' + escapeHTML(it.title) + '</p>'
    + '<p class="card-meta">' + it.year + '<span class="badge">' + it.typeLabel + '</span></p>'
    + '</div>';
  card.addEventListener("click", () => goDetail(it.type, it.id));
  return card;
}

async function renderSearch(query) {
  homeEl.style.display = "none";
  favview.style.display = "none";
  state.mode = "search";
  state.query = query;
  state.path = null; state.params = null; state.type = null; state.availMode = null; state.title = null;
  state.page = 0;
  state.totalPages = 0;
  state.loading = false;
  state.seen = new Set();
  state.count = 0;
  grid.innerHTML = "";
  loadmore.innerHTML = "";

  gridWrap.style.display = "none";

// 「もっとみる」ページ＝任意のTMDBクエリをページ送りで全件表示
async function renderBrowse(cfg) {
  homeEl.style.display = "none";
  favview.style.display = "none";
  qInput.value = "";
  state.mode = "browse";
  state.query = null;
  state.path = cfg.path;

  state.type = cfg.type || "movie";
  state.availMode = cfg.availMode || null;
  state.title = cfg.title || "もっとみる";
  state.page = 0;
  state.totalPages = 0;
  state.loading = false;
  state.seen = new Set();
  state.count = 0;
  grid.innerHTML = "";
  loadmore.innerHTML = "";
  gridTitle.style.display = "none";
  gridWrap.style.display = "none";
  window.scrollTo(0, 0);
  showStatus("読み込み中…", false, true);

  await loadNextPage(true);
}

async function loadNextPage(isFirst = false) {
  if (state.loading) return;
  if (!isFirst && state.totalPages && state.page >= state.totalPages) return;

  state.loading = true;
  searchBtn.disabled = true;
  if (!isFirst) loadmore.innerHTML = '<div class="spinner sm"></div>';

  const nextPage = state.page + 1;
  try {
    let data, raws;
    if (state.mode === "browse") {
      data = await tmdbFetch(state.path, Object.assign(
        { language: LANG, region: REGION, page: String(nextPage) }, state.params));
      raws = (data.results || []).filter(r => r.media_type !== "person");
    } else {
      data = await tmdbFetch("/search/multi", {
        language: LANG, query: state.query, include_adult: "false",
        region: REGION, page: String(nextPage)
      });
      raws = (data.results || []).filter(r => r.media_type === "movie" || r.media_type === "tv");
    }

    state.page = data.page || nextPage;
    state.totalPages = data.total_pages || 0;

    let items = raws
      .map(r => makeItem(r, state.type || r.media_type))
      .filter(it => it.id && it.poster);

    // ブラウズで配信絞り込みが必要なら providers で実確認（見放題 or いずれか）
    if (state.mode === "browse" && state.availMode && items.length) {
      const jps = await Promise.all(items.map(it => getJPProviders(it.type, it.id)));
      items = items.filter((it, i) => {
        const jp = jps[i];
        if (jp === null) return false;
        return state.availMode === "flatrate" ? jpHasFlatrate(jp) : jpHasAny(jp);
      });
    }

    if (isFirst && items.length === 0 && state.count === 0) {
      const msg = state.mode === "browse"
        ? "該当する作品が見つかりませんでした。"
        : "「" + escapeHTML(state.query) + "」に一致する作品が見つかりませんでした。別のキーワードでお試しください。";
      showStatus(msg, true);
      return;
    }

    if (isFirst) {
      results.innerHTML = "";
      if (state.title) { gridTitle.textContent = state.title; gridTitle.style.display = "block"; }
      else { gridTitle.style.display = "none"; }
      gridWrap.style.display = "block";
    }

    appendItems(items);
    updateLoadMore();
  } catch (e) {
    if (isFirst) {
      showStatus(e.message || "読み込み中にエラーが発生しました。", true);
    } else {
      loadmore.innerHTML = '<div class="loadmore" style="color:var(--danger)">追加読み込みに失敗しました。スクロールで再試行します。</div>';
      state.page = nextPage - 1;
    }
  } finally {
    state.loading = false;
    searchBtn.disabled = false;
  }
}

function updateLoadMore() {
  if (state.totalPages && state.page >= state.totalPages) {
    loadmore.innerHTML = '<div class="loadmore end">— すべて表示しました（' + state.count + '件） —</div>';
  } else {
    loadmore.innerHTML = "";
  }
}

function showStatus(msg, isError = false, withSpinner = false) {
  gridWrap.style.display = "none";
  results.innerHTML = statusHTML(msg, isError, withSpinner);
}

function appendItems(items) {
  const frag = document.createDocumentFragment();
  items.forEach(it => {
    const key = it.type + ":" + it.id;
    if (state.seen.has(key)) return;
    state.seen.add(key);
    frag.appendChild(gridCardEl(it));
    state.count++;
  });
  grid.appendChild(frag);
}

// --- 無限スクロール監視 ---
const observer = new IntersectionObserver((entries) => {
  if (entries[0].isIntersecting && gridWrap.style.display !== "none") {
    loadNextPage(false);
  }
}, { rootMargin: "400px" });
observer.observe(sentinel);

async function openDetail(type, id) {
  overlay.classList.add("open");
  lockScroll();
  modal.innerHTML = statusHTML("読み込み中…", false, true);

  modal.scrollTop = 0;
  try {
    const [detail, providers] = await Promise.all([
      tmdbFetch("/" + type + "/" + id, { language: LANG, append_to_response: "videos,credits,recommendations" }),
      tmdbFetch("/" + type + "/" + id + "/watch/providers")
    ]);

    const jp = (providers.results && providers.results.JP) || {};
    // 同一サービスの重複（広告つき/なし等）をまとめる
    ["flatrate", "rent", "buy", "free", "ads"].forEach(k => {
      if (jp[k]) jp[k] = dedupeProviders(jp[k]);
    });
    // 「無料」（完全無料＋広告つき無料）を1タブに集約
    jp.freeAll = dedupeProviders([].concat(jp.free || [], jp.ads || []));
    // Netflix公式Top10で配信確認済みの作品は、TMDBにNetflixが無くても見放題に補完
    // （JustWatch由来データの遅延対策。Netflix自身のランキング＝配信中が確定）
    if ((type === "movie" && netflixMovieIds.has(detail.id))
        || (type === "tv" && netflixTvIds.has(detail.id))) {
      jp.flatrate = jp.flatrate || [];
      if (!jp.flatrate.some(p => p.provider_id === 8)) {
        jp.flatrate.unshift({ provider_id: 8, provider_name: "Netflix", logo_path: NETFLIX_LOGO });
      }
    }
    detailState = { type, detail, jp, link: jp.link || null, activeTab: pickDefaultTab(jp) };
    recordRecent(favItemFromDetail(type, detail)); // 閲覧履歴に記録（トラフィック）
    trackEvent("view_title", { content_type: type, item_id: id });
    renderDetail();
  } catch (e) {
    modal.innerHTML =
      '<div class="modal-header"><div class="modal-info"><h2>エラー</h2></div>'
      + '<button class="closeBtn" id="closeBtn">×</button></div>'
      + statusHTML(e.message || "情報の取得に失敗しました。", true);
    bindClose();
  }
}

function pickDefaultTab(jp) {
  if ((jp.flatrate || []).length) return "flatrate";
  if ((jp.freeAll || []).length) return "freeAll";
  if ((jp.rent || []).length) return "rent";
  if ((jp.buy || []).length) return "buy";
  return "flatrate";
}

// 同一ブランドの「広告つきプラン」などを1つにまとめるためのブランド名抽出
function brandName(name) {
  return name
    .replace(/\s*Standard with Ads/i, "")
    .replace(/\s*with Ads/i, "")
    .replace(/\s*Amazon Channel/i, "")
    .trim();
}

// 同じサービスが複数（広告つき/なし等）並ぶのを排除。広告なし版を優先して残す。
function dedupeProviders(list) {
  const byBrand = new Map();
  for (const p of list) {
    const brand = brandName(p.provider_name);
    const isAds = /with ads/i.test(p.provider_name);
    const existing = byBrand.get(brand);
    if (!existing) {
      byBrand.set(brand, p);
    } else if (/with ads/i.test(existing.provider_name) && !isAds) {
      byBrand.set(brand, p); // 既存が広告つきで、こちらが広告なしなら置き換え
    }
  }
  return Array.from(byBrand.values());
}

// 配信先URLとラベルを決定。直リンク可能なら {url, direct:true}、
// 不可なら JustWatch(fallback) を {url, direct:false}、どちらも無ければ null。
function resolveProviderLink(providerId, rawTitle, fallback) {
  const build = PROVIDER_SEARCH[providerId];
  if (build) return { url: build(encodeURIComponent(rawTitle)), direct: true };
  if (fallback) return { url: fallback, direct: false };
  return null;
}

// 提携IDが実値に差し替わっていれば true（{XXX} が残っていれば未設定＝無効）

function affForProvider(providerId) { const c = AFFILIATE_LINKS[providerId]; return affReady(c) ? c : null; }

// ===== アプリ起動（インストール済みならアプリへ・無ければWebへ） =====
// iOS: httpsのままでUniversal Links対応サービス（Prime Video等）が自動でアプリを開く。
//      （カスタムスキームは未インストール時にエラー画面が出るため使わない）
// Android: intent:// にパッケージ指定＋browser_fallback_url を付け、
//      アプリがあれば起動・無ければ同じWeb URLへ自動フォールバックする。
function mobileOS() {
  const ua = navigator.userAgent || "";
  if (/android/i.test(ua)) return "android";
  if (/iphone|ipad|ipod/i.test(ua) ||
      (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1)) return "ios";
  return "other";
}
// 主要サービスのAndroid起動設定。
//   値="パッケージ名" … そのアプリを指定して起動（Netflix等）
//   値=""            … パッケージを固定せずApp Links解決に任せる（Prime Video）。
//                       primevideo.comはPrime Video系アプリのみが担当（mShop=Amazon
//                       ショッピングは非担当）のため、端末にあるPrime Video版が選ばれる。
//   未登録            … 変換せずWeb（App Links/Universal Linksに任せる）
const ANDROID_PKG = {
  8: "com.netflix.mediaclient", 1796: "com.netflix.mediaclient",   // Netflix
  9: "", 2100: "",                                                 // Prime Video（App Links解決に委譲）
  10: "com.amazon.mShop.android.shopping",                          // Amazon（レンタル/購入）
  337: "com.disney.disneyplus",                                     // Disney+
  15: "jp.happyon.android",                                         // Hulu 日本
  2683: "jp.co.fujitv.fodapp"                                       // FOD（ベストエフォート）
};
// 直リンク(direct)のときだけ、Androidはintent化してアプリ起動を狙う
function appAwareHref(url, providerId) {
  if (providerId != null && mobileOS() === "android"
      && (providerId in ANDROID_PKG) && /^https:\/\//i.test(url)) {
    const pkg = ANDROID_PKG[providerId];
    try {
      const u = new URL(url);
      const pkgPart = pkg ? "package=" + pkg + ";" : ""; // 空ならApp Links解決に任せる
      return "intent://" + u.host + u.pathname + u.search + u.hash
        + "#Intent;scheme=https;" + pkgPart
        + "S.browser_fallback_url=" + encodeURIComponent(url) + ";end";
    } catch (e) { return url; }
  }
  return url;
}

  if (list.length > 0) {

      // 見た目だけ差し替え（override値は最終src。無ければTMDBロゴ）
      const logo = PROVIDER_LOGO_OVERRIDE[p.provider_id] || posterURL(p.logo_path, "w92");
      const logoEl = logo ? '<img src="' + logo + '" alt="">' : '';

      // 見放題タブ × 未登録サービス × 提携設定済み → 新規登録アフィリへ誘導
      const aff = (activeTab === "flatrate" && !myServices.has(p.provider_id))
        ? affForProvider(p.provider_id) : null;
      if (aff) {
        return '<a class="provider affiliate" href="' + escapeHTML(aff.url)
          + '" target="_blank" rel="noopener sponsored">'
          + logoEl
          + '<span>' + escapeHTML(p.provider_name)
          + '<span class="pr-badge">PR</span></span>'
          + '<span class="arrow aff-arrow">' + escapeHTML(aff.label) + ' ›</span></a>';
      }

      const dest = resolveProviderLink(p.provider_id, title, link);
      let tag = "div", href = "", arrow = "";
      if (dest) {
        tag = "a";
        // 直リンクのときだけアプリ起動を狙う（fallback=JustWatchページはWebのまま）
        const finalUrl = appAwareHref(dest.url, dest.direct ? p.provider_id : null);
        // モバイルはトップレベル遷移にして Universal Links/App Links を確実に発火させる。
        // iOSは target="_blank"（新規タブ）だと universal link が発火せず、Safariや
        // 別アプリにURLが渡ってしまうため、アプリ起動には同一タブ遷移が必要。
        const tgt = mobileOS() === "other" ? ' target="_blank"' : '';
        href = ' href="' + escapeHTML(finalUrl) + '"' + tgt + ' rel="noopener"';
        arrow = dest.direct
          ? '<span class="arrow">' + escapeHTML(p.provider_name) + 'で見る ›</span>'
          : '<span class="arrow">配信ページへ ›</span>';
      }
      return '<' + tag + ' class="provider"' + href + '>'
        + logoEl + '<span>' + escapeHTML(p.provider_name) + '</span>' + arrow + '</' + tag + '>';
    }).join("");
    providersHTML = '<div class="providers">' + cells + '</div>';
  } else {
    const tabLabel = (TAB_DEFS.find(t => t.key === activeTab) || {}).label || "";
    providersHTML = statusHTML("この作品は、日本の「" + tabLabel + "」での配信情報が見つかりませんでした。", true);
  }

  const sectionBody = hasAny
    ? tabsHTML + providersHTML
    : statusHTML("この作品は、日本での配信情報（見放題・レンタル・購入）が見つかりませんでした。", true);

  // TMDBに配信データが無いサービス（DMM TV等）の検索リンク
  const encTitle = encodeURIComponent(title);
  const extraHTML =
    '<p class="extra-label">📍 その他のサービスで探す</p>'
    + '<p class="extra-note">TMDBに配信情報が無いサービスです。作品名で検索します。</p>'
    + '<div class="extra-links">'
    + EXTRA_SERVICES.map(s =>
        '<a class="extra-link" href="' + escapeHTML(s.url(encTitle))
        + '" target="_blank" rel="noopener">' + escapeHTML(s.name) + 'で探す ›</a>'
      ).join("")
    + '</div>';

  // 評価・上映時間・ジャンル
  const ratingHTML = detail.vote_average
    ? '<span><span class="star">★</span> ' + detail.vote_average.toFixed(1) + '</span>' : '';
  const runtime = isMovie ? detail.runtime : ((detail.episode_run_time || [])[0]);
  const runtimeHTML = runtime ? '<span>' + runtime + '分</span>' : '';
  const metaHTML = '<div class="modal-meta">' + ratingHTML
    + '<span>' + year + '</span><span>' + typeLabel + '</span>' + runtimeHTML + '</div>';
  const genresHTML = (detail.genres && detail.genres.length)
    ? '<div class="genre-tags">' + detail.genres.slice(0, 4)
        .map(g => '<span class="genre-tag">' + escapeHTML(g.name) + '</span>').join("") + '</div>'
    : '';

  // 予告編（YouTube）
  const trailer = pickTrailer(detail.videos);
  const trailerHTML = trailer
    ? '<div class="trailer"><iframe src="https://www.youtube.com/embed/' + trailer.key
      + '" allow="accelerometer; encrypted-media; picture-in-picture" allowfullscreen loading="lazy"></iframe></div>'
    : '';

  // 出演者
  const cast = ((detail.credits && detail.credits.cast) || []).slice(0, 10);
  const castHTML = cast.length
    ? '<p class="sub-label">出演者</p><div class="cast-rail">' + cast.map(c => {
        const img = c.profile_path
          ? '<img loading="lazy" src="' + IMG_BASE + 'w185' + c.profile_path + '" alt="">'
          : '<div class="noimg">No Image</div>';
        return '<div class="cast">' + img + '<p class="nm">' + escapeHTML(c.name) + '</p>'
          + (c.character ? '<p class="ch">' + escapeHTML(c.character) + '</p>' : '') + '</div>';
      }).join("") + '</div>'
    : '';

  // 似た作品
  const recs = (((detail.recommendations && detail.recommendations.results) || []))
    .map(r => makeItem(r, type)).filter(it => it.id && it.poster).slice(0, 15);
  const recsHTML = recs.length
    ? '<p class="sub-label">こんな作品も</p><div class="rail">' + recs.map(it => {
        const p = posterURL(it.poster, "w185");
        return '<div class="rail-card" data-type="' + it.type + '" data-id="' + it.id + '">'
          + '<img class="rail-poster" loading="lazy" src="' + p + '" alt="">'
          + '<p class="rail-title">' + escapeHTML(it.title) + '</p></div>';
      }).join("") + '</div>'
    : '';

  modal.innerHTML =
    '<div class="modal-sticky"><button class="closeBtn" id="closeBtn">×</button></div>'
    + '<div class="modal-header">' + posterEl
    + '<div class="modal-info"><h2>' + escapeHTML(title) + '</h2>'
    + metaHTML + genresHTML
    + '<p class="overview">' + overview + '</p></div></div>'
    + '<div class="modal-section">'
    + '<div class="action-row">'
    + '<button class="action-btn fav' + (favOn ? ' on' : '') + '" id="favToggle">'
    + (favOn ? '♥ お気に入り済み' : '♡ お気に入り') + '</button>'
    + '<button class="action-btn" id="shareBtn">🔗 シェア</button>'
    + '</div>'
    + trailerHTML + sectionBody + extraHTML + castHTML + recsHTML
    + '</div>'
    + '<p class="tmdb-note">ロゴをタップすると各サービスで作品名を検索して開きます<br>配信状況は変わることがあります。最終確認は各公式サイトでお願いします。<br>配信情報の提供：JustWatch / The Movie Database (TMDB)'
    + (anyAffiliateReady() ? '<br>「PR」の付いたリンクは広告（アフィリエイト）です。経由して登録されると当サイトに報酬が発生する場合があります。' : '')
    + '</p>';

  modal.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => {
      detailState.activeTab = btn.dataset.tab;
      renderDetail();
    });
  });
  // 似た作品 → モーダル内で作品を切り替え
  modal.querySelectorAll(".rail-card[data-id]").forEach(c => {
    c.addEventListener("click", () => goDetail(c.dataset.type, c.dataset.id));
  });
  // シェア
  const sb = document.getElementById("shareBtn");
  if (sb) sb.addEventListener("click", shareDetail);
  // お気に入りトグル
  const ft = document.getElementById("favToggle");
  if (ft) ft.addEventListener("click", () => {
    const now = toggleFav(favItemFromDetail(type, detail));
    ft.classList.toggle("on", now);
    ft.textContent = now ? "♥ お気に入り済み" : "♡ お気に入り";
    showToast(now ? "お気に入りに追加しました" : "お気に入りから削除しました");
    if (favview.style.display === "block") renderFavorites();
  });
  bindClose();
}

function bindClose() {

}

// iOS Safariでも確実に効く背景スクロールロック。
// body{overflow:hidden}はiOSで効かずモーダル内スクロールが元位置に戻されるため、
// bodyをposition:fixedで固定し、解除時に元のスクロール位置へ復元する。
let scrollLockY = 0;
let scrollLocked = false;
function lockScroll() {
  if (scrollLocked) return;
  scrollLocked = true;
  scrollLockY = window.scrollY || window.pageYOffset || 0;
  document.body.style.position = "fixed";
  document.body.style.top = "-" + scrollLockY + "px";
  document.body.style.left = "0";
  document.body.style.right = "0";
  document.body.style.width = "100%";
}
function unlockScroll() {
  if (!scrollLocked) return;
  scrollLocked = false;
  document.body.style.position = "";
  document.body.style.top = "";
  document.body.style.left = "";
  document.body.style.right = "";
  document.body.style.width = "";
  window.scrollTo(0, scrollLockY);
}

// モーダルのDOMを閉じるだけ（履歴は触らない・popstateから呼ばれる）
function closeModalUI() {
  overlay.classList.remove("open");
  unlockScroll();
  modal.innerHTML = "";
  detailState = null;
}

// ×・背景タップ：履歴を1つ戻す＝ブラウザの戻ると同じ挙動に統一
function closeModal() {
  if (history.state && history.state.view === "detail") {
    history.back();
  } else {
    closeModalUI();
  }
}

overlay.addEventListener("click", (e) => { if (e.target === overlay) closeModal(); });

// --- 予告編抽出 ---
function pickTrailer(videos) {
  const list = (videos && videos.results) || [];
  const yt = list.filter(v => v.site === "YouTube");
  return yt.find(v => v.type === "Trailer") || yt.find(v => v.type === "Teaser") || yt[0] || null;
}

// --- シェア（作品ごとのURL） ---
function shareUrl(type, id) {
  return location.origin + location.pathname + "?t=" + type + "&id=" + id;
}
async function shareDetail() {
  if (!detailState) return;
  const { type, detail } = detailState;
  const title = detail.title || detail.name || "";
  const url = shareUrl(type, detail.id);
  const text = "『" + title + "』はどこで観れる？ #dokomiru で配信先をチェック";
  if (navigator.share) {
    try { await navigator.share({ title, text, url }); } catch (e) {}
  } else {
    try {
      await navigator.clipboard.writeText(url);
      showToast("リンクをコピーしました");
    } catch (e) {
      window.prompt("このリンクをコピーしてください", url);
    }
  }
}

// ====================================================================
//  履歴ナビゲーション（ブラウザの戻る/進むに対応）
//  ・go*()  : 履歴を積んでから描画（ユーザー操作の入口）
//  ・render*()/openDetail() : 描画のみ（履歴は触らない／popstateから呼ぶ）
//  モーダルは下の画面DOMを保持したまま重なるので、戻る＝再フェッチ無しで即閉じる
// ====================================================================
function pathFor(st) {
  const base = location.pathname;
  if (st && st.view === "detail") return base + "?t=" + st.type + "&id=" + st.id;
  if (st && st.view === "search") return base + "?q=" + encodeURIComponent(st.q);
  if (st && st.view === "favorites") return base + "?view=fav";
  if (st && st.view === "browse") return base + "?list=" + encodeURIComponent((st.config && (st.config.key || st.config.title)) || "more");
  return base; // home
}
function pushNav(st) {
  try { history.pushState(st, "", pathFor(st)); } catch (e) {}
}
function replaceNav(st) {
  try { history.replaceState(st, "", pathFor(st)); } catch (e) {}
}

function goHome() {
  if (history.state && history.state.view === "home") { renderHome(); return; }
  pushNav({ view: "home" });
  renderHome();
}
function goFavorites() {
  if (history.state && history.state.view === "favorites") { renderFavorites(); return; }
  pushNav({ view: "favorites" });
  renderFavorites();
}
function goDetail(type, id) {
  pushNav({ view: "detail", type, id });
  openDetail(type, id);
}
function goBrowse(cfg) {
  pushNav({ view: "browse", config: cfg });
  renderBrowse(cfg);
}

// 履歴の状態に合わせて画面を復元（戻る/進む時）
function applyState(st) {
  st = st || { view: "home" };
  if (st.view === "detail") {
    openDetail(st.type, st.id);
    return;
  }
  // detail以外：モーダルが開いていれば閉じる
  if (overlay.classList.contains("open")) closeModalUI();

  if (st.view === "search" && st.q) {
    qInput.value = st.q;
    // 同じ検索結果が残っていれば再フェッチせず表示だけ戻す
    if (state.query === st.q && grid.children.length) {
      homeEl.style.display = "none";
      favview.style.display = "none";
      results.innerHTML = "";
      gridWrap.style.display = "block";
    } else {
      renderSearch(st.q);
    }
  } else if (st.view === "browse" && st.config) {
    // 詳細から戻った等でグリッドが残っていれば再フェッチせず表示だけ戻す
    if (state.mode === "browse" && state.title === st.config.title && grid.children.length) {
      homeEl.style.display = "none";
      favview.style.display = "none";
      results.innerHTML = "";
      gridWrap.style.display = "block";
    } else {
      renderBrowse(st.config);
    }
  } else if (st.view === "favorites") {
    renderFavorites();
  } else {
    // home：DOMが残っていれば表示だけ戻す（再フェッチ回避）
    qInput.value = "";
    gridWrap.style.display = "none";
    favview.style.display = "none";
    homeEl.style.display = "block";
    if (!homeEl.innerHTML.trim()) renderHome();
  }
}
window.addEventListener("popstate", (e) => applyState(e.state));

// 共有URL（?t=&id=）で開いた場合：home(ベース)の上にdetailを積む→戻るでhomeへ
function openFromUrl() {
  try {
    const p = new URLSearchParams(location.search);
    const t = p.get("t"), id = p.get("id");
    if ((t === "movie" || t === "tv") && id) goDetail(t, id);
  } catch (e) {}
}

}

// ====================================================================
function loadFavorites() {
  try {
    const arr = JSON.parse(localStorage.getItem("favorites") || "[]");
    const m = new Map();
    arr.forEach(it => { if (it && it.type && it.id) m.set(it.type + ":" + it.id, it); });
    return m;
  } catch (e) { return new Map(); }
}
let favorites = loadFavorites();

function saveFavorites() {
  try { localStorage.setItem("favorites", JSON.stringify(Array.from(favorites.values()))); } catch (e) {}
}
function favKey(type, id) { return type + ":" + id; }
function isFav(type, id) { return favorites.has(favKey(type, id)); }

function toggleFav(item) {
  const k = favKey(item.type, item.id);
  if (favorites.has(k)) favorites.delete(k);
  else favorites.set(k, item);
  saveFavorites();
  updateFavBtn();
  invalidateProfile();   // 嗜好が変わったのでパーソナライズを再計算
  return favorites.has(k);
}

function updateFavBtn() {
  const n = favorites.size;
  favBtn.classList.toggle("has", n > 0);
  favBtn.innerHTML = (n > 0 ? "♥" : "♡")
    + (n > 0 ? '<span class="fav-count">' + (n > 99 ? "99+" : n) + '</span>' : "");
}

// 詳細データ → グリッド/レール共通のアイテム形式（保存用）
function favItemFromDetail(type, detail) {
  const isMovie = type === "movie";
  const title = isMovie ? (detail.title || detail.name) : (detail.name || detail.title);
  const dateStr = isMovie ? detail.release_date : detail.first_air_date;
  return {
    type,
    id: detail.id,
    title: title || "（タイトル不明）",
    year: dateStr ? dateStr.slice(0, 4) : "—",
    typeLabel: isMovie ? "映画" : "ドラマ",
    poster: detail.poster_path || null,
    genres: (detail.genres || []).map(g => g.id)   // パーソナライズ用のジャンル嗜好
  };
}

function loadRecentlyViewed() {
  try {
    const arr = JSON.parse(localStorage.getItem("recentlyViewed") || "[]");
    return Array.isArray(arr) ? arr.filter(it => it && it.type && it.id) : [];
  } catch (e) { return []; }
}
let recentlyViewed = loadRecentlyViewed();

function recordRecent(item) {
  if (!item || !item.id) return;
  const k = item.type + ":" + item.id;
  recentlyViewed = recentlyViewed.filter(it => (it.type + ":" + it.id) !== k);
  recentlyViewed.unshift(item);     // 最新を先頭へ
  if (recentlyViewed.length > 20) recentlyViewed = recentlyViewed.slice(0, 20);
  try { localStorage.setItem("recentlyViewed", JSON.stringify(recentlyViewed)); } catch (e) {}
  invalidateProfile();              // 閲覧傾向が変わったのでパーソナライズを再計算
}

// Netflix公式Top10データ（週次バッチが assets/netflix_jp_top10.json を更新）。
// 1回だけ取得しキャッシュ。films[].id は「今 Netflix JP で配信中」が確定なので、
// TMDBにNetflixが無い作品の見放題補完にも使う（JustWatchのデータ遅延対策）。
const NETFLIX_LOGO = "/pbpMk2JmcoNnQwx5JGpXngfoWtp.jpg";
let netflixMovieIds = new Set();
let netflixTvIds = new Set();
let _netflixData = null;
function loadNetflixData() {
  if (!_netflixData) {
    _netflixData = fetch("assets/netflix_jp_top10.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .catch(() => null)
      .then(data => {
        if (data && Array.isArray(data.films)) data.films.forEach(f => { if (f.id) netflixMovieIds.add(f.id); });
        if (data && Array.isArray(data.tv)) data.tv.forEach(f => { if (f.id) netflixTvIds.add(f.id); });
        return data;
      });
  }
  return _netflixData;
}

// 1レール分を描画（データ無ければそのセクションを隠す）
function fillNetflixRail(boxId, secId, items, typeLabel) {
  const box = document.getElementById(boxId);

  const list = (items || []).filter(it => it.id && it.poster);
  if (!list.length) { const sec = document.getElementById(secId); if (sec) sec.remove(); return; }
  const rail = document.createElement("div");
  rail.className = "rail";
  list.forEach(it => rail.appendChild(railCardEl({
    type: it.type, id: it.id, title: it.title,
    poster: it.poster, year: it.year, typeLabel: typeLabel
  }, it.rank)));
  box.innerHTML = "";
  box.appendChild(rail);
}

async function renderNetflixRail() {
  let data = null;
  try { data = await loadNetflixData(); } catch (e) {}
  fillNetflixRail("home-netflix", "sec-netflix", (data && data.films) || [], "映画");
  fillNetflixRail("home-netflix-tv", "sec-netflix-tv", (data && data.tv) || [], "ドラマ");

    return;
  }
  favview.innerHTML = '<section class="row"><h2 class="row-title">♥ お気に入り'
    + '<span class="filter-tag">' + items.length + '件</span></h2>'
    + '<div class="grid" id="fav-grid"></div></section>';
  const g = document.getElementById("fav-grid");
  items.forEach(it => g.appendChild(gridCardEl(it)));
}

// --- ホーム表示へ切替 ---
function goHomeView() {
  gridWrap.style.display = "none";
  results.innerHTML = "";
  favview.style.display = "none";
  homeEl.style.display = "block";
}

// --- ユーティリティ ---
function escapeHTML(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// ====================================================================
//  検索サジェスト（予測変換）
// ====================================================================
const suggestEl = document.getElementById("suggest");
let suggestItems = [];   // 表示中の候補（共通アイテム形式）
let suggestActive = -1;  // ハイライト中のインデックス
let suggestSeq = 0;      // 競合リクエスト破棄用
let suggestTimer = null;

function hideSuggest() {
  suggestEl.hidden = true;
  suggestEl.innerHTML = "";
  suggestItems = [];
  suggestActive = -1;
  qInput.setAttribute("aria-expanded", "false");
}

function renderSuggest(items) {
  suggestItems = items;
  suggestActive = -1;
  if (!items.length) {
    suggestEl.innerHTML = '<li class="suggest-empty">候補が見つかりません</li>';
  } else {
    suggestEl.innerHTML = items.map((it, i) => {
      const thumb = it.poster
        ? '<img class="suggest-thumb" loading="lazy" src="' + posterURL(it.poster, "w92") + '" alt="">'
        : '<span class="suggest-thumb ph">画像<br>なし</span>';
      return '<li class="suggest-item" role="option" data-i="' + i + '">' +
        thumb +
        '<span class="suggest-meta">' +
          '<span class="suggest-title">' + escapeHTML(it.title) + '</span>' +
          '<span class="suggest-sub">' + it.typeLabel + ' · ' + it.year + '</span>' +
        '</span></li>';
    }).join("");
  }
  suggestEl.hidden = false;
  qInput.setAttribute("aria-expanded", "true");
}

function chooseSuggest(i) {
  const it = suggestItems[i];
  if (!it) return;
  qInput.value = it.title;
  hideSuggest();
  goDetail(it.type, it.id);
}

function setSuggestActive(i) {
  const nodes = suggestEl.querySelectorAll(".suggest-item");
  if (!nodes.length) return;
  suggestActive = (i + nodes.length) % nodes.length;
  nodes.forEach((n, idx) => n.classList.toggle("active", idx === suggestActive));
  nodes[suggestActive].scrollIntoView({ block: "nearest" });
}

async function fetchSuggest(query) {
  const seq = ++suggestSeq;
  let data;
  try {
    data = await tmdbFetch("/search/multi", {
      language: LANG, query, include_adult: "false", page: "1"
    });
  } catch (e) {
    return; // サジェストは静かに失敗（本検索の邪魔をしない）
  }
  if (seq !== suggestSeq) return;            // 古いレスポンスは破棄
  if (qInput.value.trim() !== query) return; // 入力が変わっていたら破棄
  const items = (data.results || [])
    .filter(r => r.media_type === "movie" || r.media_type === "tv")
    .slice(0, 7)
    .map(r => makeItem(r));
  renderSuggest(items);
}

// クリック/タップで候補を選択（mousedownでblurより先に処理）
suggestEl.addEventListener("mousedown", (e) => {
  const li = e.target.closest(".suggest-item");
  if (!li) return;
  e.preventDefault();
  chooseSuggest(Number(li.dataset.i));
});

qInput.addEventListener("input", () => {
  const q = qInput.value.trim();
  if (suggestTimer) clearTimeout(suggestTimer);
  if (q.length < 1) { suggestSeq++; hideSuggest(); return; }
  suggestTimer = setTimeout(() => fetchSuggest(q), 220);
});

qInput.addEventListener("focus", () => {
  if (suggestItems.length) {
    suggestEl.hidden = false;
    qInput.setAttribute("aria-expanded", "true");
  }
});

document.addEventListener("click", (e) => {
  if (!e.target.closest(".search-field")) hideSuggest();
});

// --- イベント ---
searchBtn.addEventListener("click", () => { hideSuggest(); doSearch(); });
qInput.addEventListener("keydown", (e) => {
  const open = !suggestEl.hidden && suggestItems.length > 0;
  if (e.key === "ArrowDown") {
    if (open) { e.preventDefault(); setSuggestActive(suggestActive + 1); }
    return;
  }
  if (e.key === "ArrowUp") {
    if (open) { e.preventDefault(); setSuggestActive(suggestActive - 1); }
    return;
  }
  if (e.key === "Escape") {
    if (open) { e.preventDefault(); hideSuggest(); }
    return;
  }
  if (e.key === "Enter") {
    if (open && suggestActive >= 0) { e.preventDefault(); chooseSuggest(suggestActive); return; }
    hideSuggest();
    doSearch();
  }
});
homeLink.addEventListener("click", () => { qInput.value = ""; goHome(); });
settingsBtn.addEventListener("click", openSettings);
settingsOverlay.addEventListener("click", (e) => { if (e.target === settingsOverlay) closeSettings(); });
favBtn.addEventListener("click", goFavorites);

// 初期表示＝ホーム（履歴のベース）。URLに作品指定があればその詳細を上に重ねる
updateFavBtn();
loadNetflixData(); // Netflix配信確認用IDを先読み（ディープリンクでも補完が効くように）
replaceNav({ view: "home" });
renderHome();
openFromUrl();
</script>
